<body>
  <h1>Ejemplos de tipos de input</h1>

  <form>
    <p><input type="button" value="Botón"></p>
    <p><input type="checkbox"> Checkbox</p>
    <p><input type="color"></p>
    <p><input type="date"></p>
    <p><input type="datetime-local"></p>
    <p><input type="email" placeholder="Correo electrónico"></p>
    <p><input type="file"></p>
    <p><input type="hidden" value="dato oculto"></p>
    <p><input type="image" src="https://via.placeholder.com/80" alt="Botón de imagen"></p>
    <p><input type="month"></p>
    <p><input type="number" placeholder="Número"></p>
    <p><input type="password" placeholder="Contraseña"></p>
    <p><input type="radio" name="opcion"> Radio</p>
    <p><input type="range" min="0" max="100"></p>
    <p><input type="reset" value="Reiniciar"></p>
    <p><input type="search" placeholder="Buscar..."></p>
    <p><input type="submit" value="Enviar"></p>
    <p><input type="tel" placeholder="Teléfono"></p>
    <p><input type="text" placeholder="Texto"></p>
    <p><input type="time"></p>
    <p><input type="url" placeholder="https://ejemplo.com"></p>
    <p><input type="week"></p>
  </form>
